name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # -------------------------------------------------
  # 1️⃣ OpenMP-enabled build
  # -------------------------------------------------
  test-openmp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Linux: no extra OpenMP install needed on GitHub runners (GCC/OpenMP deps are already available)

      # macOS
      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libomp
          OMP_PREFIX="$(brew --prefix libomp)"
          echo "OMP_PREFIX=${OMP_PREFIX}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I${OMP_PREFIX}/include" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L${OMP_PREFIX}/lib -Wl,-rpath,${OMP_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "CFLAGS=-Xpreprocessor -fopenmp -I${OMP_PREFIX}/include" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-Xpreprocessor -fopenmp -I${OMP_PREFIX}/include" >> "$GITHUB_ENV"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run tests (OpenMP)
        env:
          OMP_NUM_THREADS: 16
        run: |
          python -c "import os, subprocess, sys, tempfile; os.chdir(tempfile.gettempdir()); sys.exit(subprocess.call([sys.executable, '-m', 'pytest', '-rs', os.path.join(os.environ['GITHUB_WORKSPACE'], 'tests', 'system')]))"


  # -------------------------------------------------
  # 2️⃣ Serial fallback build (no OpenMP installed)
  # -------------------------------------------------
  test-serial:
    runs-on: ${{ matrix.os }}
    env:
      SMUDGY_FORCE_SERIAL: "1"
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # DO NOT install libomp
      # DO NOT set compiler flags

      - name: Install package (serial build expected)
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Verify serial fallback
        run: |
          python -c "import os, tempfile; os.chdir(tempfile.gettempdir()); import smudgy.core._cpp_functions_ext as cpp; assert cpp.has_openmp is False"

      - name: Run tests (Serial)
        run: |
          python -c "import os, subprocess, sys, tempfile; os.chdir(tempfile.gettempdir()); sys.exit(subprocess.call([sys.executable, '-m', 'pytest', '-rs', os.path.join(os.environ['GITHUB_WORKSPACE'], 'tests', 'system')]))"